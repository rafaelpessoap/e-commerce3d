name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./docker/backend.Dockerfile
          push: true
          tags: ghcr.io/rafaelpessoap/e-commerce3d-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./docker/frontend.Dockerfile
          push: true
          tags: ghcr.io/rafaelpessoap/e-commerce3d-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://elitepinup3d.com.br

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [build-and-push]

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 24.152.39.104
          username: masterdaweb
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            cd /opt/elitepinup
            docker compose pull
            docker compose up -d
            # Wait for backend to be healthy
            sleep 15
            curl -sf http://127.0.0.1:3002/api/health || (docker compose logs --tail=50 && exit 1)
            curl -sf http://127.0.0.1:3003 || (docker compose logs --tail=50 && exit 1)
            echo "Deploy OK at $(date)"
