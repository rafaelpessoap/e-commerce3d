services:
  db:
    image: postgres:18-alpine
    container_name: elitepinup_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-elitepinup}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-elitepinup}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-elitepinup} -d ${DB_NAME:-elitepinup}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # SEM ports — só acessível pelos outros containers na rede

  backend:
    image: ghcr.io/rafaelpessoap/e-commerce3d-backend:latest
    container_name: elitepinup_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3002"
      DATABASE_URL: "postgresql://${DB_USER:-elitepinup}:${DB_PASSWORD}@db:5432/${DB_NAME:-elitepinup}"
      REDIS_URL: "redis://host.docker.internal:6379"
      ELASTICSEARCH_URL: "http://host.docker.internal:9200"
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN}
      MERCADOPAGO_WEBHOOK_SECRET: ${MERCADOPAGO_WEBHOOK_SECRET}
      MELHORENVIO_TOKEN: ${MELHORENVIO_TOKEN}
      S3_ENDPOINT: "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
      S3_REGION: auto
      S3_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      S3_BUCKET: ${R2_BUCKET_NAME}
      CDN_URL: ${R2_PUBLIC_URL}
      SMTP_HOST: host.docker.internal
      SMTP_PORT: "587"
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      SITE_URL: "https://elitepinup3d.com.br"
    ports:
      - "127.0.0.1:3002:3002"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: ghcr.io/rafaelpessoap/e-commerce3d-frontend:latest
    container_name: elitepinup_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: "https://elitepinup3d.com.br"
    ports:
      - "127.0.0.1:3003:3000"

volumes:
  postgres_data:
